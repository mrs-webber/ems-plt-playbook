name: Deploy to S3 + CloudFront

# Deploys the built site whenever you push to main.
# You can also run it manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for GitHub's OIDC login to AWS (recommended, keyless).
permissions:
  contents: read
  id-token: write

# Avoid overlapping deploys.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Set these in your repo: Settings → Secrets and variables → Actions.
      # Variables (not secret):
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Create this IAM role with a GitHub OIDC trust policy (see DEPLOYMENT.md)
          # and store its ARN as the AWS_ROLE_ARN secret.
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed assets (long cache)
        # Everything under /_astro/ is content-hashed and safe to cache forever.
        run: |
          aws s3 sync dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --exclude "*" \
            --include "_astro/*" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Sync everything else (no long cache)
        # HTML and other files must revalidate so new deploys show up.
        run: |
          aws s3 sync dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --exclude "_astro/*" \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
